<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <title>QuickChat</title>
    <meta name="description" content="A modern real-time chat application with messaging, media sharing, and reactions" />
    <meta name="author" content="QuickChat" />
    <meta name="theme-color" content="#000000" />
    <meta name="color-scheme" content="light dark" />
    
    <!-- PWA Manifest -->
    <link rel="manifest" href="/manifest.json" />
    
    <!-- Apple Web App -->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="QuickChat" />
    
    <!-- Microsoft Tiles -->
    <meta name="msapplication-TileColor" content="#000000" />

    <!-- OG Tags -->
    <meta property="og:title" content="QuickChat" />
    <meta property="og:description" content="A modern real-time chat application with messaging, media sharing, and reactions" />
    <meta property="og:type" content="website" />

    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:site" content="@ChatApp" />
    
    <!-- Favicon -->
    <link rel="icon" href="/favicon.ico" />
    <link rel="shortcut icon" href="/favicon.ico" />
  </head>

  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
    <script>
      // Register Service Worker for offline support and caching
      if ('serviceWorker' in navigator) {
        navigator.serviceWorker.register('/service-worker.js', { scope: '/' })
          .then((reg) => {
            console.log('Service Worker registered successfully:', reg);
            
            // Check for updates periodically
            setInterval(() => {
              reg.update();
            }, 60000); // Check every minute
          })
          .catch((err) => {
            console.log('Service Worker registration failed:', err);
          });
      }

      // PWA Install Prompt
      let deferredPrompt;
      
      window.addEventListener('beforeinstallprompt', (e) => {
        // Prevent the mini-infobar from appearing
        e.preventDefault();
        // Stash the event for later use.
        deferredPrompt = e;
        // Show install button
        const installButton = document.getElementById('pwa-install-button');
        if (installButton) {
          installButton.style.display = 'block';
        }
      });

      // Global install function for UI buttons
      window.installApp = async () => {
        if (deferredPrompt) {
          // Show the install prompt.
          deferredPrompt.prompt();
          // Wait for the user to respond to the prompt
          const { outcome } = await deferredPrompt.userChoice;
          console.log(`User response to the install prompt: ${outcome}`);
          // Clear the deferredPrompt for the next time.
          deferredPrompt = null;
          // Hide install button
          const installButton = document.getElementById('pwa-install-button');
          if (installButton) {
            installButton.style.display = 'none';
          }
        }
      };

      // Listen for app installed event
      window.addEventListener('appinstalled', () => {
        console.log('PWA was installed successfully');
        deferredPrompt = null;
        const installButton = document.getElementById('pwa-install-button');
        if (installButton) {
          installButton.style.display = 'none';
        }
      });
    </script>
  </body>
</html>
